<!DOCTYPE html>
<html>

<head>

<title>Niafas Bites</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#fff8f0;
text-align:center;
}

header{
padding:40px;
background:#f4d03f;
}

.logo{
width:180px;
}

h1{
font-size:40px;
margin-top:10px;
}

.products{
margin-top:40px;
}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:12px;
display:inline-block;
width:200px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
background:#f4d03f;
border:none;
padding:10px 20px;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e2b92e;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Niafas Bites 🍬</h1>

<p>The sweetest treats!</p>

</header>

<div class="products">

<h2>Our Candy</h2>

<div class="card">
<h3>Chocolate</h3>
<p>$2</p>
<button>Order</button>
</div>

<div class="card">
<h3>Gummies</h3>
<p>$1.50</p>
<button>Order</button>
</div>

<div class="card">
<h3>Lollipops</h3>
<p>$1</p>
<button>Order</button>
</div>

</div>

</body>

</html>
